version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/linkis-engineconn-plugins/flink/flink-shims-1.16.2"
    ignore:
      # Flink shims modules are version-specific compatibility layers.
      # Upgrading the Flink dependency in-place breaks the shims contract
      # (module name must match the supported Flink version).
      # If a new Flink version needs to be supported, create a new shims module
      # (e.g. flink-shims-1.20.4) instead of modifying existing ones.
      - dependency-name: "org.apache.flink:*"
